<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prédiction EUR → MAD</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <h1 class="text-center mb-4">Prédiction EUR → MAD</h1>

    <div class="card shadow p-4">
        <p class="mb-3">Cliquez sur le bouton pour obtenir la prédiction du taux de change :</p>
        <button class="btn btn-primary w-100 mb-3" onclick="predict()">Obtenir taux</button>
        <h3 class="text-center text-success" id="result"></h3>
    </div>
</div>

<script>
async function predict() {
    const res = await fetch('/predict');
    const data = await res.json();
    document.getElementById('result').innerText = "Taux prédit : " + data.prediction_EUR_MAD.toFixed(4) + " MAD";
}
</script>

</body>
</html>
